name = "mortgage-data-engine"
main = "src/index.ts"
compatibility_date = "2024-06-14"
compatibility_flags = ["nodejs_compat"]

# ─── Cloudflare D1 Database ───
[[d1_databases]]
binding = "DB"
database_name = "mortgage-data-engine"
database_id = "YOUR_D1_DATABASE_ID"  # Run: wrangler d1 create mortgage-data-engine

# ─── R2 Storage (rate sheet archives, crawl logs) ───
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "mortgage-data-storage"

# ─── Browser Rendering (replaces Firecrawl) ───
[browser]
binding = "BROWSER"

# ─── Workers AI (structured extraction) ───
[ai]
binding = "AI"

# ─── KV Namespace (caching, rate limiting) ───
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"  # Run: wrangler kv namespace create CACHE

# ─── Cron Triggers (scheduling) ───
[triggers]
crons = [
  "0 2,6,10,14,18,22 * * *",   # Wholesale rates — every 4 hours UTC
  "0 10 * * *",                  # Retail rates — daily 10:00 UTC
  "0 11 * * *",                  # Regulatory updates (structured crawler) — daily 11:00 UTC
  "0 12 * * 1",                  # DPA programs — Mondays 12:00 UTC
  "0 12 * * 3",                  # Agent: lender discovery — Wednesdays 12:00 UTC
  "0 12 * * 4"                   # Agent: regulatory deep scan — Thursdays 12:00 UTC
]

# ─── Environment Variables ───
[vars]
ENVIRONMENT = "production"
CREDIT_BUDGET_MONTHLY = "13350"
ALERT_WEBHOOK_URL = ""  # Slack/Discord webhook for alerts
FIRECRAWL_AGENT_URL = ""  # URL of deployed web-agent service (e.g. https://lendpilot-agent.vercel.app)

# ─── Secrets (set via: wrangler secret put SECRET_NAME) ───
# ADMIN_API_KEY          — for manual trigger endpoints
# BROKER_WEBHOOK_SECRET  — for CRM lead.created webhooks
# FIRECRAWL_AGENT_API_KEY — shared secret between Worker and web-agent service
